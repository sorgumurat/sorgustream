<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub - Film & Canlı TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07070f;--bg1:#0e0e1a;--bg2:#141420;--bg3:#1a1a2a;
  --border:#252535;--border2:#303048;
  --text1:#e8e8f0;--text2:#a0a0b8;--text3:#606078;
  --accent:#7c6bcc;--accent2:#a78bfa;--accent-bg:#1a1530;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:sans-serif;overflow-x:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-btns button{margin-left:15px;padding:8px 12px;border-radius:var(--radius-sm);transition:0.2s; background:var(--bg2); border:1px solid var(--border)}
.nav-btns button:hover{background:var(--accent); color:white}
.container{padding:20px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px}
.card{background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:0.3s;position:relative}
.card:hover{transform:translateY(-5px);border-color:var(--accent)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.card-info{padding:12px;font-size:13px}
.rating{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.8);padding:4px 8px;border-radius:4px;color:var(--yellow);font-size:12px;font-weight:bold}
#player-modal{display:none;position:fixed;inset:0;background:#000;z-index:1000}
#video-wrapper{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
iframe, video{width:100%;height:100%;border:none}
.search-box input{background:var(--bg2);border:1px solid var(--border);color:white;padding:10px 20px;border-radius:20px;width:300px;outline:none;transition:0.3s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 10px rgba(124,107,204,0.3)}
</style>
</head>
<body>

<header>
    <div style="font-weight:bold;color:var(--accent);font-size:24px;cursor:pointer" onclick="initHome()">StreamHub</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Film, Dizi veya Kanal ara..." oninput="debounceSearch(this.value)">
    </div>
    <div class="nav-btns">
        <button onclick="initHome()">🏠 Ana Sayfa</button>
        <button onclick="fetchM3U()" style="border-color:var(--accent2)">📺 Canlı TV</button>
    </div>
</header>

<div class="container" id="mainContent">
    <div style="text-align:center;padding:50px">Yükleniyor...</div>
</div>

<div id="player-modal">
    <button onclick="closePlayer()" style="position:absolute;top:20px;right:20px;z-index:1100;font-size:40px;color:white;background:none;border:none">&times;</button>
    <div id="video-wrapper">
        <iframe id="player-iframe" allowfullscreen style="display:none"></iframe>
        <video id="hls-player" controls style="display:none"></video>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
let searchTimer;

// 1. ANA SAYFA: Trendleri Getir
async function initHome() {
    $('mainContent').innerHTML = '<div style="text-align:center;padding:50px">Trendler yükleniyor...</div>';
    try {
        const res = await fetch('/api/trending');
        const data = await res.json();
        renderGrid(data.results || [], "Haftanın Trendleri");
    } catch (e) {
        $('mainContent').innerHTML = '<div style="color:var(--red);text-align:center">Sunucu bağlantısı kurulamadı. Lütfen Vercel ayarlarını kontrol edin.</div>';
    }
}

// 2. M3U LİSTESİ: Canlı TV Kanalları
async function fetchM3U() {
    $('mainContent').innerHTML = '<div style="text-align:center;padding:50px">Kanal listesi çekiliyor...</div>';
    try {
        const res = await fetch('/api/m3u-list');
        const list = await res.json();
        let html = '<div class="grid">';
        list.forEach(item => {
            html += `
                <div class="card" onclick="playStream('${item.url}')">
                    <img src="${item.logo || 'https://placehold.co/400x600?text=TV'}" onerror="this.src='https://placehold.co/400x600?text=TV'">
                    <div class="card-info"><b>${item.name}</b></div>
                </div>`;
        });
        html += '</div>';
        $('mainContent').innerHTML = '<h2 style="margin-bottom:20px">Canlı TV Kanalları</h2>' + html;
    } catch (e) {
        $('mainContent').innerHTML = '<div style="color:var(--red);text-align:center">M3U listesi sunucudan alınamadı.</div>';
    }
}

// 3. ARAMA: Debounce ile API Yormadan Arama
function debounceSearch(q) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchTMDB(q), 500);
}

async function searchTMDB(query) {
    if (query.length < 3) return;
    try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderGrid(data.results || [], `"${query}" için sonuçlar`);
    } catch (e) { console.error("Arama hatası"); }
}

function renderGrid(items, title) {
    let html = `<h2 style="margin-bottom:20px">${title}</h2><div class="grid">`;
    items.forEach(item => {
        html += `
            <div class="card" onclick="openPlayer(${item.id}, '${item.type || 'movie'}')">
                <div class="rating">★ ${item.rating || 'N/A'}</div>
                <img src="${item.poster || ''}" onerror="this.src='https://placehold.co/400x600?text=Afiş+Yok'">
                <div class="card-info">
                    <b>${item.title || item.name}</b><br>
                    <small style="color:var(--text3)">${item.year || ''} • ${item.type === 'tv' ? 'Dizi' : 'Film'}</small>
                </div>
            </div>`;
    });
    html += '</div>';
    $('mainContent').innerHTML = html;
}

// 4. PLAYER: Video ve Iframe Yönetimi
function openPlayer(id, type) {
    const url = `https://vidsrc.xyz/embed/${type}?tmdb=${id}`;
    playStream(url);
}

function playStream(url) {
    $('player-modal').style.display = 'block';
    document.body.style.overflow = 'hidden';
    const iframe = $('player-iframe');
    const video = $('hls-player');

    if (url.includes('.m3u8') || url.includes('.mp4')) {
        iframe.style.display = 'none';
        video.style.display = 'block';
        if (Hls.isSupported() && url.includes('.m3u8')) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
    } else {
        video.style.display = 'none';
        iframe.style.display = 'block';
        iframe.src = url;
    }
}

function closePlayer() {
    $('player-modal').style.display = 'none';
    document.body.style.overflow = 'auto';
    $('player-iframe').src = '';
    $('hls-player').pause();
    $('hls-player').src = '';
}

window.onload = initHome;
</script>
</body>
</html>
