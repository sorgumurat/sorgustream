<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* Tasarımını koruyan temel CSS */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#070710; --bg1:#0e0e1a; --bg2:#141425;
  --accent:#7c6bcc; --accent2:#a78bfa; --yellow:#facc15;
  --text1:#e8e8f0; --border:#252535; --radius:12px;
}
body{ background:var(--bg0); color:var(--text1); font-family:sans-serif; overflow-x:hidden; }

#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 65px;
  background: rgba(14, 14, 26, 0.95); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 25px; border-bottom: 1px solid var(--border); z-index: 1000;
}
.logo { font-size: 22px; font-weight: 800; color: var(--accent2); cursor: pointer; }
.search-box { flex: 1; max-width: 450px; margin: 0 20px; }
.search-box input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 25px; color: white; outline: none;
}
.nav-btns { display: flex; gap: 12px; }
.btn {
  padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: 0.2s; border: none;
}
.btn-home { background: var(--accent); color: white; }
.btn-live { background: var(--yellow); color: #000; }

#app { padding: 85px 25px 25px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
.card { background: var(--bg1); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.card-info { padding: 12px; font-size: 13px; font-weight: 600; text-align: center; }

#player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
.close-btn { position: absolute; top: 20px; right: 25px; font-size: 40px; color: white; cursor: pointer; z-index: 2100; }
#video-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

@media (max-width: 700px) {
  #topbar { flex-direction: column; height: auto; padding: 15px; gap: 10px; }
  #app { padding-top: 150px; }
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo" onclick="initHome()">▶ StreamHub</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Film, dizi veya kanal ara..." oninput="handleSearch(this.value)">
  </div>
  <div class="nav-btns">
    <button class="btn btn-home" onclick="initHome()">🏠 ANA SAYFA</button>
    <button class="btn btn-live" onclick="fetchLiveTV()">📺 CANLI TV</button>
  </div>
</div>

<div id="app">
  <div id="mainContent"></div>
</div>

<div id="player-modal">
  <span class="close-btn" onclick="closePlayer()">&times;</span>
  <div id="video-content"></div>
</div>

<script>
async function initHome() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '<p>Yükleniyor...</p>';
  try {
    const res = await fetch('/api/trending');
    const data = await res.json();
    renderGrid(data.results, "🔥 Haftalık Trendler");
  } catch (e) { content.innerHTML = 'Bağlantı hatası.'; }
}

async function fetchLiveTV() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '<p>Kanallar yükleniyor...</p>';
  try {
    const res = await fetch('/api/m3u-list');
    const data = await res.json();
    let html = '<h2 style="margin-bottom:20px">📺 Canlı TV Kanalları</h2><div class="grid">';
    data.forEach(ch => {
      html += `
        <div class="card" onclick="playStream('${ch.url}', true)">
          <img src="${ch.logo || 'https://via.placeholder.com/400x600?text=TV'}" onerror="this.src='https://via.placeholder.com/400x600?text=TV'">
          <div class="card-info">${ch.name}</div>
        </div>`;
    });
    content.innerHTML = html + '</div>';
  } catch (e) { content.innerHTML = 'Liste yüklenemedi.'; }
}

function playStream(url, isLive = false) {
  const modal = document.getElementById('player-modal');
  const wrapper = document.getElementById('video-content');
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
  wrapper.innerHTML = '';

  if (url.includes('.m3u8')) {
    wrapper.innerHTML = `<video id="video-player" controls style="width:100%; height:100%"></video>`;
    const video = document.getElementById('video-player');
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }
  } else {
    // Eski stabil kaynak: vidsrc.xyz
    wrapper.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%; height:100%"></iframe>`;
  }
}

function closePlayer() {
  document.getElementById('player-modal').style.display = 'none';
  document.getElementById('video-content').innerHTML = '';
  document.body.style.overflow = 'auto';
}

function renderGrid(items, title) {
  let html = `<h2 style="margin-bottom:20px">${title}</h2><div class="grid">`;
  items.forEach(item => {
    // Dublaj denemesini geri alıp vidsrc.xyz'ye döndük
    const embedUrl = `https://vidsrc.xyz/embed/${item.type || 'movie'}?tmdb=${item.id}`;
    html += `
      <div class="card" onclick="playStream('${embedUrl}')">
        <img src="${item.poster}" alt="${item.title}">
        <div class="card-info">${item.title}</div>
      </div>`;
  });
  document.getElementById('mainContent').innerHTML = html + '</div>';
}

let searchTimer;
function handleSearch(q) {
  clearTimeout(searchTimer);
  if (q.length < 3) return;
  searchTimer = setTimeout(async () => {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderGrid(data.results, `"${q}" için sonuçlar`);
  }, 500);
}

window.onload = initHome;
</script>
</body>
</html>
