<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub - Film & Canlı TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* ... mevcut stillerine ek olarak / üzerine yaz ... */
:root {
  --accent: #7c6bcc;
  --yellow: #facc15;
  --bg2: #141420;
}

header {
    background: #0e0e1a;
    border-bottom: 2px solid var(--accent);
}

/* Okunaklı Menü Butonları */
.nav-btns button {
    margin-left: 10px;
    padding: 10px 18px;
    border-radius: 8px;
    background: var(--accent); /* Mor arka plan */
    color: #white !important;   /* Beyaz yazı */
    font-weight: bold;
    text-transform: uppercase;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.nav-btns button:hover {
    background: var(--yellow);
    color: #000 !important;
    transform: translateY(-2px);
}

.m3u-card {
    background: var(--bg2);
    border: 1px solid #333;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
}
</style>
</head>
<body>

<header>
    <div style="font-weight:bold;color:var(--accent);font-size:24px">StreamHub</div>
    <div class="nav-btns">
        <button onclick="initHome()">🏠 ANA SAYFA</button>
        <button onclick="fetchM3U()" style="background:var(--yellow); color:#000 !important">📺 CANLI TV</button>
    </div>
</header>

<div id="mainContent" class="container"></div>

<div id="player-modal">
    <button onclick="closePlayer()" style="position:fixed; top:20px; right:20px; color:white; font-size:40px; background:none; z-index:2000">&times;</button>
    <div id="video-wrapper" style="width:100%; height:100%">
        </div>
</div>

<script>
// --- AKILLI OYNATICI (Vidmoly, M3U8, MP4 Çözücü) ---
function playSmartStream(url) {
    const wrapper = document.getElementById('video-wrapper');
    const modal = document.getElementById('player-modal');
    modal.style.display = 'block';
    wrapper.innerHTML = ''; // Temizle

    if (url.includes('vidmoly.me')) {
        // Vidmoly bir iframe sayfasıdır
        const embedUrl = url.replace('/w/', '/embed-') + '.html'; 
        wrapper.innerHTML = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%; height:100%"></iframe>`;
    } 
    else if (url.includes('.m3u8')) {
        // Canlı TV linki
        wrapper.innerHTML = `<video id="hls-player" controls style="width:100%; height:100%"></video>`;
        const video = document.getElementById('hls-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    } 
    else {
        // Diğer (Vidsrc vb.)
        wrapper.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%; height:100%"></iframe>`;
    }
}

// Dublaj için openPlayer fonksiyonunu güncelle
function openPlayer(id, type) {
    // Vidsrc.pro dublaj konusunda daha stabildir
    const url = `https://vidsrc.pro/embed/${type}/${id}?lang=tr`; 
    playSmartStream(url);
}

// ... fetchM3U ve diğer fonksiyonlar ...
</script>
</body>
</html>
