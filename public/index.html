<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub - Film & Canlı TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07070f;--bg1:#0e0e1a;--bg2:#141420;--bg3:#1a1a2a;
  --border:#252535;--border2:#303048;
  --text1:#e8e8f0;--text2:#a0a0b8;--text3:#606078;
  --accent:#7c6bcc;--accent2:#a78bfa;--accent-bg:#1a1530;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
/* M3U Listesi İçin Ekstra Stiller */
.m3u-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 20px; }
.m3u-item { background: var(--bg2); padding: 10px; border-radius: var(--radius-sm); cursor: pointer; text-align: center; border: 1px solid var(--border); transition: 0.2s; }
.m3u-item:hover { border-color: var(--accent); background: var(--bg3); }
.m3u-item img { width: 50px; height: 50px; object-fit: contain; margin: 0 auto 10px; }
#hls-player { width: 100%; height: 100%; display: none; background: #000; }
/* ... (Mevcut diğer stillerin devamı) ... */
</style>
</head>
<body>

<header style="display:flex; align-items:center; justify-content:space-between; padding:15px 25px; background:var(--bg1); border-bottom:1px solid var(--border)">
    <div style="font-weight:bold; font-size:20px; color:var(--accent)">StreamHub</div>
    <div style="display:flex; gap:15px">
        <button onclick="loadSection('home')">Ana Sayfa</button>
        <button onclick="fetchM3U()" style="color:var(--yellow)">📺 Canlı TV / M3U</button>
    </div>
    </header>

<main id="content-area">
    </main>

<div id="player-modal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.95)">
    <div style="height:50px; display:flex; align-items:center; justify-content:flex-end; padding:0 20px">
        <button onclick="closePlayer()" style="font-size:24px">&times;</button>
    </div>
    <div id="video-wrapper" style="width:100%; height:calc(100% - 100px)">
        <iframe id="player-iframe" frameborder="0" allowfullscreen style="width:100%; height:100%; display:none"></iframe>
        <video id="hls-player" controls></video>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);

// --- M3U Fonksiyonları ---
async function fetchM3U() {
    const content = $('content-area');
    content.innerHTML = '<div style="padding:20px">Liste yükleniyor...</div>';
    
    try {
        const res = await fetch('/api/m3u-list');
        const list = await res.json();
        
        let html = '<div class="m3u-list">';
        list.forEach(item => {
            html += `
                <div class="m3u-item" onclick="playStream('${item.url}')">
                    ${item.logo ? `<img src="${item.logo}" onerror="this.src='https://placehold.co/50x50?text=TV'">` : '<img src="https://placehold.co/50x50?text=TV">'}
                    <div style="font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.name}</div>
                </div>
            `;
        });
        html += '</div>';
        content.innerHTML = html;
    } catch (e) {
        content.innerHTML = '<div style="padding:20px; color:red">Liste yüklenemedi.</div>';
    }
}

function playStream(url) {
    const modal = $('player-modal');
    const iframe = $('player-iframe');
    const video = $('hls-player');
    
    modal.style.display = 'block';
    
    if (url.includes('.m3u8')) {
        iframe.style.display = 'none';
        video.style.display = 'block';
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    } else {
        video.style.display = 'none';
        iframe.style.display = 'block';
        iframe.src = url;
    }
}

function closePlayer() {
    $('player-modal').style.display = 'none';
    $('player-iframe').src = '';
    $('hls-player').pause();
    $('hls-player').src = '';
}

// --- Mevcut TMDB Fonksiyonlarının Devamı ---
// Buraya kendi orijinal scriptlerini (searchTMDB, openPlayer vb.) olduğu gibi ekleyebilirsin.
</script>
</body>
</html>
