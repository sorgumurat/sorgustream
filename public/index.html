<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub - Film & Canlı TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07070f;--bg1:#0e0e1a;--bg2:#141420;--bg3:#1a1a2a;
  --border:#252535;--text1:#e8e8f0;--text2:#a0a0b8;--accent:#7c6bcc;--yellow:#facc15;
  --radius:10px;
}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:sans-serif;overflow-x:hidden}

/* --- Düzenlenmiş Header --- */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg1);
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 1000;
    gap: 15px;
}

.logo { font-weight: bold; color: var(--accent); font-size: 22px; cursor: pointer; min-width: fit-content; }

.search-box { flex-grow: 1; max-width: 500px; position: relative; }
.search-box input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: white;
    padding: 10px 15px;
    border-radius: 20px;
    outline: none;
}

.nav-btns { display: flex; gap: 10px; }
.nav-btns button {
    padding: 8px 15px;
    border-radius: 8px;
    background: var(--accent);
    color: white !important;
    font-weight: bold;
    font-size: 12px;
    white-space: nowrap;
    transition: 0.3s;
}
.nav-btns button.live-btn { background: var(--yellow); color: #000 !important; }
.nav-btns button:hover { opacity: 0.8; transform: translateY(-2px); }

/* --- İçerik Alanı --- */
.container { padding: 20px; max-width: 1400px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
.card { background: var(--bg2); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
.card:hover { border-color: var(--accent); transform: translateY(-5px); }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.card-info { padding: 10px; font-size: 13px; }

/* --- Player Modal --- */
#player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
.close-btn { position: absolute; top: 15px; right: 20px; font-size: 35px; color: white; cursor: pointer; z-index: 2100; }
#video-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

@media (max-width: 768px) {
    header { flex-direction: column; height: auto; padding: 15px; }
    .search-box { width: 100%; }
}
</style>
</head>
<body>

<header>
    <div class="logo" onclick="initHome()">StreamHub</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Film, Dizi veya Kanal..." oninput="debounceSearch(this.value)">
    </div>
    <div class="nav-btns">
        <button onclick="initHome()">🏠 ANA SAYFA</button>
        <button class="live-btn" onclick="fetchM3U()">📺 CANLI TV</button>
    </div>
</header>

<div class="container" id="mainContent"></div>

<div id="player-modal">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <div id="video-wrapper"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let searchTimer;

// --- BAŞLATMA ---
async function initHome() {
    $('mainContent').innerHTML = '<p>Trendler yükleniyor...</p>';
    try {
        const res = await fetch('/api/trending');
        const data = await res.json();
        renderGrid(data.results || [], "Haftalık Trendler");
    } catch (e) { $('mainContent').innerHTML = 'Hata oluştu.'; }
}

// --- AKILLI OYNATICI (Vidmoly, M3U8, Dublaj Destekli) ---
function playSmartStream(url) {
    const modal = $('player-modal');
    const wrapper = $('video-wrapper');
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    wrapper.innerHTML = '';

    if (url.includes('vidmoly.me')) {
        // Vidmoly URL'sini iframe dostu hale getir
        let embed = url;
        if (url.includes('/w/')) embed = url.replace('/w/', '/embed-') + '.html';
        wrapper.innerHTML = `<iframe src="${embed}" frameborder="0" allowfullscreen style="width:100%; height:100%"></iframe>`;
    } 
    else if (url.includes('.m3u8')) {
        wrapper.innerHTML = `<video id="hls-player" controls style="width:100%; height:100%"></video>`;
        const video = $('hls-player');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    } 
    else {
        wrapper.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%; height:100%"></iframe>`;
    }
}

// Film/Dizi Oynatırken vidsrc.pro (Dublaj için daha iyi) kullan
function openPlayer(id, type) {
    const url = `https://vidsrc.pro/embed/${type}/${id}?lang=tr`;
    playSmartStream(url);
}

// --- M3U LİSTESİ ---
async function fetchM3U() {
    $('mainContent').innerHTML = '<p>Kanallar yükleniyor...</p>';
    try {
        const res = await fetch('/api/m3u-list');
        const list = await res.json();
        let html = '<div class="grid">';
        list.forEach(item => {
            html += `
                <div class="card" onclick="playSmartStream('${item.url}')">
                    <img src="${item.logo || 'https://placehold.co/400x600?text=TV'}" onerror="this.src='https://placehold.co/400x600?text=TV'">
                    <div class="card-info"><b>${item.name}</b></div>
                </div>`;
        });
        html += '</div>';
        $('mainContent').innerHTML = '<h2 style="margin-bottom:15px">Canlı TV Kanalları</h2>' + html;
    } catch (e) { $('mainContent').innerHTML = 'M3U Yüklenemedi.'; }
}

function debounceSearch(q) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchTMDB(q), 500);
}

async function searchTMDB(query) {
    if (query.length < 3) return;
    const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    renderGrid(data.results || [], `"${query}" sonuçları`);
}

function renderGrid(items, title) {
    let html = `<h2 style="margin-bottom:15px">${title}</h2><div class="grid">`;
    items.forEach(item => {
        html += `
            <div class="card" onclick="openPlayer(${item.id}, '${item.type || 'movie'}')">
                <img src="${item.poster || ''}" onerror="this.src='https://placehold.co/400x600?text=Yok'">
                <div class="card-info"><b>${item.title || item.name}</b><br><small>${item.year || ''}</small></div>
            </div>`;
    });
    html += '</div>';
    $('mainContent').innerHTML = html;
}

function closePlayer() {
    $('player-modal').style.display = 'none';
    document.body.style.overflow = 'auto';
    $('video-wrapper').innerHTML = '';
}

window.onload = initHome;
</script>
</body>
</html>
