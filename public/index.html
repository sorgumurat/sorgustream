<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07070f;--bg1:#0e0e1a;--bg2:#141420;--bg3:#1a1a2a;
  --border:#252535;--border2:#303048;
  --text1:#e8e8f0;--text2:#a0a0b8;--text3:#606078;
  --accent:#7c6bcc;--accent2:#a78bfa;--accent-bg:#1a1530;
  --green:#4ade80;--yellow:#facc15;--red:#f87171;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
select{cursor:pointer;font:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;
  background:rgba(7,7,15,0.92);backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);
}
.logo{font-size:19px;font-weight:700;color:var(--accent2);white-space:nowrap;letter-spacing:-0.5px;flex-shrink:0}
.logo span{color:var(--text3);font-weight:400}
.search-box{position:relative;flex:1;max-width:500px}
.search-box input{
  width:100%;padding:8px 14px 8px 38px;
  background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text1);font-size:14px;outline:none;transition:border-color .2s;
}
.search-box input::placeholder{color:var(--text3)}
.search-box input:focus{border-color:var(--accent)}
.search-box .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.nav-pills{display:flex;gap:4px;margin-left:8px}
.nav-pill{padding:5px 14px;border-radius:20px;font-size:13px;color:var(--text2);transition:all .15s;border:0.5px solid transparent}
.nav-pill:hover,.nav-pill.active{background:var(--accent-bg);color:var(--accent2);border-color:var(--border2)}

/* ── DROPDOWN ── */
#dropdown{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);
  z-index:300;overflow:hidden;display:none;max-height:400px;overflow-y:auto;
}
.dd-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .1s}
.dd-item:hover{background:var(--bg3)}
.dd-item img{width:36px;height:54px;object-fit:cover;border-radius:4px;background:var(--bg3);flex-shrink:0}
.dd-info{flex:1;min-width:0}
.dd-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-meta{font-size:12px;color:var(--text3);margin-top:2px}
.dd-type{font-size:10px;background:var(--accent-bg);color:var(--accent2);padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}

/* ── LAYOUT ── */
#app{padding-top:56px;min-height:100vh}
.page{display:none}
.page.active{display:block}

/* ── HOME PAGE ── */
.hero-section{padding:24px 20px 0}
.section-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:3px;height:16px;background:var(--accent);border-radius:2px}

.cards-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;scroll-snap-type:x mandatory}
.cards-scroll::-webkit-scrollbar{height:4px}
.card{
  flex-shrink:0;width:140px;scroll-snap-align:start;cursor:pointer;
  border-radius:var(--radius-sm);overflow:hidden;transition:transform .2s;
}
.card:hover{transform:scale(1.04)}
.card-poster{width:140px;height:210px;object-fit:cover;background:var(--bg2)}
.card-body{padding:8px 4px}
.card-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-rating{font-size:11px;color:var(--yellow);margin-top:2px}
.card-year{font-size:11px;color:var(--text3)}

/* Büyük kart (featured) */
.featured-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 20px 24px}
.featured-card{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;aspect-ratio:16/9}
.featured-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.featured-card:hover img{transform:scale(1.05)}
.featured-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(7,7,15,0.95));
  padding:24px 14px 12px;
}
.featured-title{font-size:14px;font-weight:600}
.featured-meta{font-size:12px;color:var(--text3);margin-top:3px}
.featured-rating{position:absolute;top:10px;right:10px;background:rgba(7,7,15,0.8);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--yellow)}

/* ── PLAYER PAGE ── */
#player-page{background:var(--bg0)}
.player-layout{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - 56px)}
@media(max-width:900px){.player-layout{grid-template-columns:1fr}}

.player-main{padding:20px}
.player-header{margin-bottom:16px}
.player-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.player-title{font-size:22px;font-weight:700;line-height:1.2}
.player-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:12px;border:0.5px solid}
.badge-year{color:var(--text2);border-color:var(--border2);background:var(--bg2)}
.badge-rating{color:var(--yellow);border-color:#3a3010;background:#1e1a08}
.badge-hd{color:var(--accent2);border-color:var(--border2);background:var(--accent-bg)}
.badge-dub{color:var(--green);border-color:#1a3a20;background:#0e1e12}
.badge-genre{color:var(--text2);border-color:var(--border);background:var(--bg2)}

/* Video alanı */
.video-wrap{
  position:relative;background:#000;
  border-radius:var(--radius);overflow:hidden;
  aspect-ratio:16/9;margin-bottom:16px;
}
.video-wrap iframe{width:100%;height:100%;border:none;display:block}
.video-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:var(--bg1);color:var(--text3);
}
.play-big{
  width:72px;height:72px;background:var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .2s,background .2s;
}
.play-big:hover{transform:scale(1.1);background:var(--accent2)}
.play-big svg{margin-left:4px}

/* Kontroller */
.controls{
  background:var(--bg1);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;align-items:center;gap:16px;
}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.ctrl-select{
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);
  padding:6px 12px;color:var(--text1);font-size:13px;outline:none;transition:border-color .2s;
}
.ctrl-select:focus{border-color:var(--accent)}
.ctrl-divider{width:0.5px;height:28px;background:var(--border)}

/* Sezon/Bölüm (diziler için) */
#episode-controls{display:none;margin-bottom:16px}
.season-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.season-tab{
  padding:5px 14px;border-radius:20px;font-size:13px;
  border:0.5px solid var(--border);color:var(--text2);transition:all .15s;
}
.season-tab.active,.season-tab:hover{background:var(--accent-bg);color:var(--accent2);border-color:var(--border2)}
.episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:6px}
.ep-btn{
  padding:8px 4px;text-align:center;border-radius:var(--radius-sm);
  font-size:13px;border:0.5px solid var(--border);color:var(--text2);
  transition:all .15s;background:var(--bg1);
}
.ep-btn:hover,.ep-btn.active{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent)}

/* Kaynaklar */
.sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:16px}
.source-card{
  background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;cursor:pointer;transition:border-color .15s,background .15s;
}
.source-card:hover{border-color:var(--border2);background:var(--bg2)}
.source-card.active{border-color:var(--accent);background:var(--accent-bg)}
.src-name{font-size:14px;font-weight:500;margin-bottom:4px}
.src-qualities{font-size:11px;color:var(--text3)}
.src-features{display:flex;gap:4px;margin-top:6px}
.src-feat{font-size:10px;padding:2px 6px;border-radius:3px;border:0.5px solid}
.src-feat.dub{color:var(--green);border-color:#1a3a20;background:#0e1e12}
.src-feat.sub{color:#60a5fa;border-color:#1a2a4a;background:#0e1828}

/* Tabs (bilgi/oyuncular/benzerler) */
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:16px}
.tab-btn{
  padding:8px 16px;font-size:14px;color:var(--text3);border-bottom:2px solid transparent;
  transition:all .15s;margin-bottom:-1px;
}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text1)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Film bilgisi */
.overview{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.info-item-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.info-item-val{font-size:14px;color:var(--text1)}

/* Cast */
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px}
.cast-card{text-align:center;cursor:pointer}
.cast-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--bg2);margin:0 auto 6px}
.cast-name{font-size:12px;font-weight:500}
.cast-char{font-size:11px;color:var(--text3);margin-top:1px}

/* Similar */
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}

/* Sidebar */
.player-sidebar{
  background:var(--bg1);border-left:0.5px solid var(--border);
  padding:20px 16px;overflow-y:auto;max-height:calc(100vh - 56px);
  position:sticky;top:56px;
}
.sidebar-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px}
.sidebar-cards{display:flex;flex-direction:column;gap:10px}
.sidebar-card{display:flex;gap:10px;cursor:pointer;padding:8px;border-radius:var(--radius-sm);transition:background .15s}
.sidebar-card:hover{background:var(--bg2)}
.sidebar-thumb{width:56px;height:80px;object-fit:cover;border-radius:4px;background:var(--bg3);flex-shrink:0}
.sidebar-info{flex:1;min-width:0;padding-top:2px}
.sidebar-card-title{font-size:13px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sidebar-card-meta{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);
  padding:10px 16px;font-size:13px;color:var(--text1);
  opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateY(0)}

/* ── LOADING ── */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--text3)}

/* Poster büyük */
.movie-poster-hero{
  width:180px;height:270px;object-fit:cover;
  border-radius:var(--radius);border:0.5px solid var(--border);flex-shrink:0;
}
.player-header-top{display:flex;gap:20px;margin-bottom:16px}
@media(max-width:600px){.player-header-top{flex-direction:column}.movie-poster-hero{width:120px;height:180px}}

/* ── API KEY UYARISI ── */
.api-warning{
  background:#1a0e0e;border:0.5px solid #4a1a1a;border-radius:var(--radius);
  padding:16px;margin:20px;font-size:14px;color:#f87171;
}
.api-warning code{background:#2a1010;padding:2px 6px;border-radius:3px;font-family:monospace;font-size:13px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">▶ Stream<span>Hub</span></div>
  <div class="search-box">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Film veya dizi ara..." autocomplete="off">
    <div id="dropdown"></div>
  </div>
  <nav class="nav-pills">
    <button class="nav-pill active" onclick="showHome('trending')">Trend</button>
    <button class="nav-pill" onclick="showHome('movie')">Filmler</button>
    <button class="nav-pill" onclick="showHome('tv')">Diziler</button>
  </nav>
</div>

<div id="app">
  <!-- HOME PAGE -->
  <div id="home-page" class="page active">
    <div id="home-content" class="loading-center">
      <div class="spinner"></div><span>Yükleniyor...</span>
    </div>
  </div>

  <!-- PLAYER PAGE -->
  <div id="player-page" class="page">
    <div class="player-layout">
      <div class="player-main" id="player-main">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
      <div class="player-sidebar" id="player-sidebar">
        <div class="sidebar-title">Önerilen</div>
        <div class="sidebar-cards" id="sidebar-cards"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// API_BASE: Backend sunucunuzun adresi
// Geliştirme: http://localhost:3000
// Prodüksiyon: kendi domain'iniz
const API_BASE = window.location.origin;

// ── STATE ───────────────────────────────────────────────────
let state = {
  currentItem: null,
  currentSource: null,
  currentSeason: 1,
  currentEpisode: 1,
  sources: [],
  playing: false,
};

// ── UTILS ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg, dur = 2500) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function imgFallback(el) { el.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1" height="1"/>'; }

async function apiFetch(path) {
  const r = await fetch(API_BASE + path);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

// ── PAGES ───────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── HOME ────────────────────────────────────────────────────
async function showHome(type = 'trending') {
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
  event?.target?.classList.add('active');
  showPage('home-page');
  $('home-content').innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Yükleniyor...</span></div>';

  try {
    let data;
    if (type === 'trending') {
      data = await apiFetch('/api/trending?type=all&period=week&lang=tr-TR');
    } else {
      data = await apiFetch(`/api/popular?type=${type}&lang=tr-TR`);
    }
    renderHome(data, type);
  } catch (e) {
    $('home-content').innerHTML = `
      <div class="api-warning">
        <strong>⚠️ API Bağlantısı Kurulamadı</strong><br><br>
        Lütfen backend sunucusunu başlatın:<br><br>
        <code>cp .env.example .env</code><br>
        <code>nano .env  # TMDB_API_KEYS'i doldurun</code><br>
        <code>npm install && npm start</code>
      </div>`;
  }
}

function renderHome(items, type) {
  const label = type === 'trending' ? '🔥 Bu Hafta Trend' : type === 'movie' ? '🎬 Popüler Filmler' : '📺 Popüler Diziler';

  // İlk 8'i büyük grid, kalanı scroll
  const featured = items.slice(0, 8);
  const rest = items.slice(8, 28);

  let html = `<div style="padding:20px 20px 0"><div class="section-title">${label}</div></div>`;

  html += '<div class="featured-row">';
  featured.forEach(item => {
    html += `<div class="featured-card" onclick="openPlayer(${item.id},'${item.type}')">
      <img src="${item.backdrop || item.poster || ''}" alt="${esc(item.title)}" loading="lazy" onerror="imgFallback(this)">
      <div class="featured-overlay">
        <div class="featured-title">${esc(item.title)}</div>
        <div class="featured-meta">${item.year || ''} · ${(item.genres||[]).slice(0,2).join(', ')}</div>
      </div>
      <div class="featured-rating">★ ${item.rating}</div>
    </div>`;
  });
  html += '</div>';

  if (rest.length) {
    html += `<div style="padding:0 20px 4px"><div class="section-title">Daha Fazlası</div></div>`;
    html += '<div style="padding:0 20px 24px"><div class="cards-scroll">';
    rest.forEach(item => {
      html += `<div class="card" onclick="openPlayer(${item.id},'${item.type}')">
        <img class="card-poster" src="${item.poster||''}" alt="${esc(item.title)}" loading="lazy" onerror="imgFallback(this)">
        <div class="card-body">
          <div class="card-title">${esc(item.title)}</div>
          <div class="card-rating">★ ${item.rating}</div>
          <div class="card-year">${item.year||''}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  }

  $('home-content').innerHTML = html;
}

// ── PLAYER ──────────────────────────────────────────────────
async function openPlayer(id, type) {
  showPage('player-page');
  $('player-main').innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Yükleniyor...</span></div>';
  $('sidebar-cards').innerHTML = '';
  state.playing = false;
  state.currentSeason = 1;
  state.currentEpisode = 1;

  try {
    const [detail, sourcesData] = await Promise.all([
      apiFetch(`/api/${type}/${id}?lang=tr-TR`),
      apiFetch(type === 'movie' ? `/api/sources/movie/${id}` : `/api/sources/tv/${id}/1/1`),
    ]);

    state.currentItem = detail;
    state.sources = sourcesData.sources || [];
    state.currentSource = state.sources[0] || null;

    renderPlayer(detail, type);
    renderSidebar(detail.similar || []);
  } catch (e) {
    $('player-main').innerHTML = `<div class="api-warning">İçerik yüklenemedi: ${e.message}</div>`;
  }
}

function renderPlayer(item, type) {
  const hasDub = state.sources.some(s => s.hasDub);
  const genreBadges = (item.genres || []).slice(0, 3).map(g => `<span class="badge badge-genre">${g}</span>`).join('');

  let html = `
  <div class="player-header">
    <div class="player-header-top">
      ${item.poster ? `<img class="movie-poster-hero" src="${item.poster}" alt="${esc(item.title)}" onerror="imgFallback(this)">` : ''}
      <div style="flex:1">
        <div class="player-title">${esc(item.title)}</div>
        ${item.originalTitle && item.originalTitle !== item.title ? `<div style="font-size:13px;color:var(--text3);margin-top:4px">${esc(item.originalTitle)}</div>` : ''}
        <div class="player-badges" style="margin-top:12px">
          ${item.year ? `<span class="badge badge-year">${item.year}</span>` : ''}
          ${item.rating ? `<span class="badge badge-rating">★ ${item.rating}</span>` : ''}
          ${hasDub ? '<span class="badge badge-dub">✓ Dual</span>' : ''}
          <span class="badge badge-hd">HD</span>
          ${genreBadges}
        </div>
        ${item.runtime ? `<div style="font-size:13px;color:var(--text3);margin-top:10px">⏱ ${item.runtime} dakika</div>` : ''}
      </div>
    </div>
  </div>

  <div class="video-wrap" id="video-wrap">
    <div class="video-placeholder" id="video-placeholder">
      <div class="play-big" onclick="playVideo()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div style="font-size:14px">İzlemek için tıkla</div>
      <div style="font-size:12px;color:var(--text3)">${state.sources.length} kaynak mevcut</div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Ses</span>
      <select class="ctrl-select" id="audio-sel">
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="en">🇺🇸 İngilizce</option>
      </select>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <span class="ctrl-label">Altyazı</span>
      <select class="ctrl-select" id="sub-sel">
        <option value="">Kapalı</option>
        <option value="tr">Türkçe</option>
        <option value="en">İngilizce</option>
        <option value="de">Almanca</option>
      </select>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <span class="ctrl-label">Kalite</span>
      <select class="ctrl-select" id="quality-sel">
        <option value="1080">1080p</option>
        <option value="720">720p</option>
        <option value="480">480p</option>
      </select>
    </div>
  </div>`;

  // Dizi ise sezon/bölüm
  if (type === 'tv' && item.seasons) {
    html += renderEpisodeControls(item);
  }

  // Kaynaklar
  html += `<div style="margin-bottom:12px"><div class="section-title" style="margin-bottom:10px">Kaynaklar (${state.sources.length})</div>
  <div class="sources-grid" id="sources-grid">${renderSourceCards()}</div></div>`;

  // Tabs
  html += `
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(this,'tab-info')">Hakkında</button>
    <button class="tab-btn" onclick="switchTab(this,'tab-cast')">Oyuncular</button>
    <button class="tab-btn" onclick="switchTab(this,'tab-similar')">Benzerler</button>
  </div>
  <div id="tab-info" class="tab-panel active">${renderTabInfo(item)}</div>
  <div id="tab-cast" class="tab-panel">${renderTabCast(item)}</div>
  <div id="tab-similar" class="tab-panel">${renderTabSimilar(item)}</div>`;

  $('player-main').innerHTML = html;
}

function renderEpisodeControls(item) {
  const seasons = item.seasons || [];
  let html = `<div id="episode-controls" style="display:block;margin-bottom:16px">
    <div class="section-title" style="margin-bottom:10px">Bölümler</div>
    <div class="season-tabs">`;
  seasons.forEach(s => {
    html += `<button class="season-tab${s.number===1?' active':''}" onclick="selectSeason(this,${s.number},${s.episodeCount})">${s.name || 'Sezon '+s.number}</button>`;
  });
  html += '</div>';
  const firstSeason = seasons[0];
  const epCount = firstSeason ? firstSeason.episodeCount : 12;
  html += `<div class="episodes-grid" id="episodes-grid">${renderEpisodeButtons(epCount, 1)}</div></div>`;
  return html;
}

function renderEpisodeButtons(count, activeSeason) {
  let html = '';
  for (let i = 1; i <= count; i++) {
    html += `<button class="ep-btn${i===state.currentEpisode?' active':''}" onclick="selectEpisode(this,${i})">${i}</button>`;
  }
  return html;
}

function selectSeason(el, season, epCount) {
  state.currentSeason = season;
  state.currentEpisode = 1;
  document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  $('episodes-grid').innerHTML = renderEpisodeButtons(epCount, season);
  loadEpisodeSources();
}

function selectEpisode(el, ep) {
  state.currentEpisode = ep;
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadEpisodeSources();
  if (state.playing) playVideo();
}

async function loadEpisodeSources() {
  const item = state.currentItem;
  try {
    const data = await apiFetch(`/api/sources/tv/${item.id}/${state.currentSeason}/${state.currentEpisode}`);
    state.sources = data.sources || [];
    state.currentSource = state.sources[0] || null;
    $('sources-grid').innerHTML = renderSourceCards();
    toast(`S${state.currentSeason}E${state.currentEpisode} kaynakları güncellendi`);
  } catch (e) { toast('Kaynaklar yüklenemedi'); }
}

function renderSourceCards() {
  return state.sources.map((s, i) => `
    <div class="source-card${i===0?' active':''}" onclick="selectSource(this,${i})">
      <div class="src-name">${s.icon || ''} ${s.name}</div>
      <div class="src-qualities">${(s.qualities||[]).join(' · ')}</div>
      <div class="src-features">
        ${s.hasDub ? '<span class="src-feat dub">DUB</span>' : ''}
        ${s.hasSub ? '<span class="src-feat sub">SUB</span>' : ''}
      </div>
    </div>`).join('');
}

function selectSource(el, idx) {
  state.currentSource = state.sources[idx];
  document.querySelectorAll('.source-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (state.playing) playVideo();
  else toast(`Kaynak: ${state.currentSource.name}`);
}

function playVideo() {
  if (!state.currentSource) { toast('Kaynak bulunamadı'); return; }
  state.playing = true;
  const wrap = $('video-wrap');
  wrap.innerHTML = `<iframe src="${state.currentSource.embedUrl}" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
}

function renderTabInfo(item) {
  return `
    ${item.overview ? `<p class="overview">${esc(item.overview)}</p>` : ''}
    <div class="info-grid">
      ${item.year ? `<div class="info-item"><div class="info-item-label">Yıl</div><div class="info-item-val">${item.year}</div></div>` : ''}
      ${item.rating ? `<div class="info-item"><div class="info-item-label">Puan</div><div class="info-item-val">★ ${item.rating} / 10</div></div>` : ''}
      ${item.runtime ? `<div class="info-item"><div class="info-item-label">Süre</div><div class="info-item-val">${item.runtime} dakika</div></div>` : ''}
      ${item.status ? `<div class="info-item"><div class="info-item-label">Durum</div><div class="info-item-val">${item.status}</div></div>` : ''}
      ${item.language ? `<div class="info-item"><div class="info-item-label">Dil</div><div class="info-item-val">${item.language.toUpperCase()}</div></div>` : ''}
      ${item.genres?.length ? `<div class="info-item"><div class="info-item-label">Türler</div><div class="info-item-val">${item.genres.join(', ')}</div></div>` : ''}
    </div>
    ${item.trailer ? `<div style="margin-top:12px"><a href="https://www.youtube.com/watch?v=${item.trailer}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--accent-bg);color:var(--accent2);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;border:0.5px solid var(--border2)">▶ YouTube Fragman</a></div>` : ''}`;
}

function renderTabCast(item) {
  if (!item.cast?.length) return '<p style="color:var(--text3);font-size:14px">Oyuncu bilgisi bulunamadı.</p>';
  return `<div class="cast-grid">${item.cast.map(c => `
    <div class="cast-card">
      <img class="cast-photo" src="${c.photo||''}" alt="${esc(c.name)}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'72\\' height=\\'72\\'><circle cx=\\'36\\' cy=\\'36\\' r=\\'36\\' fill=\\'%231a1a2a\\'/></svg>'">
      <div class="cast-name">${esc(c.name)}</div>
      <div class="cast-char">${esc(c.character||'')}</div>
    </div>`).join('')}</div>`;
}

function renderTabSimilar(item) {
  if (!item.similar?.length) return '<p style="color:var(--text3);font-size:14px">Benzer içerik bulunamadı.</p>';
  return `<div class="similar-grid">${item.similar.map(s => `
    <div class="card" onclick="openPlayer(${s.id},'${s.type}')">
      <img class="card-poster" src="${s.poster||''}" alt="${esc(s.title)}" loading="lazy" onerror="imgFallback(this)">
      <div class="card-body">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-rating">★ ${s.rating}</div>
        <div class="card-year">${s.year||''}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderSidebar(similar) {
  if (!similar.length) return;
  $('sidebar-cards').innerHTML = similar.slice(0, 12).map(s => `
    <div class="sidebar-card" onclick="openPlayer(${s.id},'${s.type}')">
      <img class="sidebar-thumb" src="${s.poster||''}" alt="${esc(s.title)}" loading="lazy" onerror="imgFallback(this)">
      <div class="sidebar-info">
        <div class="sidebar-card-title">${esc(s.title)}</div>
        <div class="sidebar-card-meta">★ ${s.rating} · ${s.year||''}</div>
        <div class="sidebar-card-meta" style="margin-top:2px">${(s.genres||[]).slice(0,2).join(', ')}</div>
      </div>
    </div>`).join('');
}

// ── TABS ────────────────────────────────────────────────────
function switchTab(btn, panelId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $(panelId)?.classList.add('active');
}

// ── SEARCH ──────────────────────────────────────────────────
let searchTimer;
$('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  clearTimeout(searchTimer);
  if (!q) { $('dropdown').style.display = 'none'; return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});

async function doSearch(q) {
  $('dropdown').style.display = 'block';
  $('dropdown').innerHTML = '<div class="loading-center" style="padding:16px"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(q)}&lang=tr-TR`);
    const items = data.results?.slice(0, 8) || [];
    if (!items.length) {
      $('dropdown').innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text3)">Sonuç bulunamadı</div>';
      return;
    }
    $('dropdown').innerHTML = items.map(item => `
      <div class="dd-item" onclick="ddSelect(${item.id},'${item.type}')">
        <img src="${item.poster||''}" alt="${esc(item.title)}" onerror="imgFallback(this)">
        <div class="dd-info">
          <div class="dd-title">${esc(item.title)}<span class="dd-type">${item.type==='movie'?'Film':'Dizi'}</span></div>
          <div class="dd-meta">${item.year||''} · ★ ${item.rating} · ${(item.genres||[]).slice(0,2).join(', ')}</div>
        </div>
      </div>`).join('');
  } catch { $('dropdown').innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text3)">Arama başarısız</div>'; }
}

function ddSelect(id, type) {
  $('dropdown').style.display = 'none';
  $('searchInput').value = '';
  openPlayer(id, type);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) $('dropdown').style.display = 'none';
});
$('searchInput').addEventListener('keydown', e => { if (e.key === 'Escape') $('dropdown').style.display = 'none'; });

// ── ESC helper ──────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ────────────────────────────────────────────────────
showHome('trending');
</script>
</body>
</html>
