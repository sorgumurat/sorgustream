version: '3.8'

services:
  streamhub:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TMDB_API_KEYS=${TMDB_API_KEYS}
      - TMDB_EMBED_API_URL=${TMDB_EMBED_API_URL:-}
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/trending"]
      interval: 30s
      timeout: 10s
      retries: 3

